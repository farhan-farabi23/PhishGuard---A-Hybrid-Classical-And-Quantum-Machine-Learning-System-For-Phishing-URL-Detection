{% extends "base.html" %}
{% block title %}403 Forbidden — PhishGuard{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/errors.css') }}">
{% endblock %}

{% block content %}
<div class="error-container text-center py-5">
  <div class="error-icon">🚫</div>
  <h1 class="error-code">403 — FORBIDDEN</h1>
  <p class="error-message">Invalid or missing CSRF token. Please go back and try again.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">RETURN HOME</a>
</div>
{% endblock %}
